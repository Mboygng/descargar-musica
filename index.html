<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG STVDIO — CLOUD DOWNLOADER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="downloader-card">
        <header class="brand-header">
            <h1>MBG STVDIO</h1>
            <p class="subtitle">MOBILE IOS SYSTEM</p>
        </header>
        
        <div class="input-field">
            <input type="text" id="target-url" placeholder="Pegá el enlace de YouTube o Playlist" autocomplete="off">
            <span class="line-border"></span>
        </div>

        <button id="trigger-btn" class="btn-main" onclick="sendToShortcut()">DESCARGAR EN IPHONE</button>

        <div class="console-output" id="terminal-screen">
            <p class="log-line text-muted">// Sistema optimizado para iOS.</p>
            <p class="log-line text-info">> Si es la primera vez, instala el motor de descargas abajo.</p>
        </div>

        <a href="https://www.icloud.com/shortcuts/8db2d9e9df444fb9a5726207865c6999" target="_blank" class="btn-setup">
            1. INSTALAR MOTOR EN IPHONE
        </a>
    </main>

    <script>
        function printLog(text, type = '') {
            const screen = document.getElementById('terminal-screen');
            const logLine = document.createElement('p');
            logLine.classList.add('log-line');
            if(type) logLine.classList.add(type);
            logLine.innerText = text;
            screen.appendChild(logLine);
            screen.scrollTop = screen.scrollHeight;
        }

        function sendToShortcut() {
            const urlInput = document.getElementById('target-url').value.trim();
            if (!urlInput) {
                printLog('! Error: Introduce un enlace válido.', 'text-error');
                return;
            }

            printLog('> Abriendo motor nativo de iOS...', 'text-success');
            
            // Usamos el protocolo nativo de Apple para pasarle el link de tu web al iPhone
            const shortcutUrl = `shortcuts://run-shortcut?name=MBG%20Downloader&input=${encodeURIComponent(urlInput)}`;
            
            setTimeout(() => {
                window.location.href = shortcutUrl;
            }, 1000);
        }
    </script>
</body>
</html>
