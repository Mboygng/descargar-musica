<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG STVDIO — DOWNLOADER SYSTEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blur-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="downloader-card">
        <header class="brand-header">
            <h1>MBG STVDIO</h1>
            <p class="subtitle" id="system-mode">DETECTANDO DISPOSITIVO...</p>
        </header>
        
        <div class="input-field">
            <input type="text" id="target-url" placeholder="Pegá el enlace de YouTube o Playlist" autocomplete="off">
            <span class="line-border"></span>
        </div>

        <button id="trigger-btn" class="btn-main" onclick="handleDownload()">DESCARGAR</button>

        <div class="progress-container" id="loading-zone" style="display: none;">
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="status-bar"></div>
            </div>
            <p class="progress-percentage" id="status-percentage">0%</p>
        </div>

        <div class="console-output" id="terminal-screen">
            <p class="log-line text-muted">// Esperando enlace...</p>
        </div>

        <div id="ios-download-container" style="display: none; margin-top: 15px; text-align: center;">
            <a href="#" id="ios-direct-link" class="btn-setup" style="display: block; background: #00ff66; color: #000; box-shadow: 0 0 15px #00ff66;">
                📥 GUARDAR MP3 EN IPHONE
            </a>
        </div>
    </main>

    <script>
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        
        const modeText = document.getElementById('system-mode');
        const mainBtn = document.getElementById('trigger-btn');
        const loadingZone = document.getElementById('loading-zone');
        const statusBar = document.getElementById('status-bar');
        const statusPercentage = document.getElementById('status-percentage');
        const iosContainer = document.getElementById('ios-download-container');
        const iosLink = document.getElementById('ios-direct-link');

        if (isIOS) {
            modeText.innerText = "MOBILE IOS SYSTEM";
            mainBtn.innerText = "PROCESAR EN IPHONE";
        } else {
            modeText.innerText = "PC CORE SYSTEM";
            mainBtn.innerText = "DESCARGAR EN PC";
        }

        function printLog(text, type = '') {
            const screen = document.getElementById('terminal-screen');
            const logLine = document.createElement('p');
            logLine.classList.add('log-line');
            if(type) logLine.classList.add(type);
            logLine.innerText = text;
            screen.appendChild(logLine);
            screen.scrollTop = screen.scrollHeight;
        }

        function simulateProgressBar() {
            if (loadingZone) {
                loadingZone.style.display = "flex";
                statusBar.style.width = "0%";
                statusPercentage.innerText = "0%";
            }
            let progress = 0;
            const interval = setInterval(() => {
                if (progress >= 90) {
                    clearInterval(interval);
                } else {
                    progress += Math.floor(Math.random() * 12) + 3;
                    if(progress > 90) progress = 90;
                    if (statusBar && statusPercentage) {
                        statusBar.style.width = `${progress}%`;
                        statusPercentage.innerText = `${progress}%`;
                    }
                }
            }, 300);
            return interval;
        }

        function endProgressBar(intervalId, success = true) {
            clearInterval(intervalId);
            if (success && statusBar && statusPercentage) {
                statusBar.style.width = "100%";
                statusPercentage.innerText = "100%";
                setTimeout(() => {
                    if (loadingZone) loadingZone.style.display = "none";
                }, 1500);
            } else {
                if (loadingZone) loadingZone.style.display = "none";
            }
        }

        // Extractor de ID de YouTube
        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function handleDownload() {
            const urlInput = document.getElementById('target-url').value.trim();
            if (!urlInput) {
                printLog('! Error: Introduce un enlace válido.', 'text-error');
                return;
            }

            if (isIOS) {
                const videoID = getYouTubeID(urlInput);
                if (!videoID) {
                    printLog('! Error: El enlace de YouTube no es válido.', 'text-error');
                    return;
                }

                mainBtn.disabled = true;
                iosContainer.style.display = "none";
                printLog('> Procesando conversión en la nube...', 'text-info');
                const progressInterval = simulateProgressBar();

                // API pública y estable de conversión MP3 de alta velocidad
                const apiUrl = `https://api.vexdh.com/v1/download/mp3?id=${videoID}`;

                // Validamos que el servidor responda bien
                fetch(apiUrl)
                    .then(res => {
                        if(res.ok) {
                            endProgressBar(progressInterval, true);
                            printLog('✓ ¡Conversión exitosa!', 'text-success');
                            
                            // Le pasamos el link directo de descarga al botón verde
                            iosLink.href = apiUrl;
                            iosContainer.style.display = "block";
                            printLog('👇 Tocá el botón verde de abajo para guardar.', 'text-success');
                        } else {
                            throw new Error();
                        }
                    })
                    .catch(() => {
                        endProgressBar(progressInterval, false);
                        printLog('! Error en el servidor de conversión. Probá de nuevo.', 'text-error');
                    })
                    .finally(() => {
                        mainBtn.disabled = false;
                    });

            } else {
                // Modo PC clásico con tu server.py
                mainBtn.disabled = true;
                printLog('> Conectando con el núcleo local de la PC...', 'text-info');
                const progressInterval = simulateProgressBar();

                fetch('http://localhost:5000/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                })
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.json();
                })
                .then(data => {
                    if (data.status === 'success') {
                        endProgressBar(progressInterval, true);
                        printLog(`✓ ${data.message}`, 'text-success');
                    } else {
                        throw new Error(data.message);
                    }
                })
                .catch(error => {
                    endProgressBar(progressInterval, false);
                    printLog('! Error de conexión. ¿Iniciaste el server.py?', 'text-error');
                })
                .finally(() => {
                    mainBtn.disabled = false;
                });
            }
        }
    </script>
</body>
</html>
