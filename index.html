<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG STVDIO — DOWNLOADER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blur-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="downloader-card">
        <header class="brand-header">
            <h1>MBG STVDIO</h1>
            <p class="subtitle">// DIRECT MOBILE DOWNLOADER</p>
        </header>
        
        <div class="input-field">
            <input type="text" id="target-url" placeholder="Pegá el link de la canción de YouTube" autocomplete="off">
            <span class="line-border"></span>
        </div>

        <button id="trigger-btn" class="btn-main" onclick="handleDownload()">PROCESAR VIDEO</button>

        <div class="progress-container" id="loading-zone" style="display: none;">
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="status-bar"></div>
            </div>
            <p class="progress-percentage" id="status-percentage">0%</p>
        </div>

        <div class="console-output" id="terminal-screen">
            <p class="log-line text-muted">// Esperando enlace...</p>
        </div>

        <div id="download-box" style="display: none; margin-top: 20px; text-align: center;">
            <a href="#" id="direct-download-link" class="btn-setup" style="display: block; background: #00ff66; color: #000; box-shadow: 0 0 15px #00ff66; font-weight: bold; text-decoration: none; padding: 12px; border-radius: 8px;">
                📥 DESCARGAR MP3 EN TU TELÉFONO
            </a>
        </div>
    </main>

    <script>
        const mainBtn = document.getElementById('trigger-btn');
        const loadingZone = document.getElementById('loading-zone');
        const statusBar = document.getElementById('status-bar');
        const statusPercentage = document.getElementById('status-percentage');
        const downloadBox = document.getElementById('download-box');
        const downloadLink = document.getElementById('direct-download-link');

        function printLog(text, type = '') {
            const screen = document.getElementById('terminal-screen');
            const logLine = document.createElement('p');
            logLine.classList.add('log-line');
            if(type) logLine.classList.add(type);
            logLine.innerText = text;
            screen.appendChild(logLine);
            screen.scrollTop = screen.scrollHeight;
        }

        function simulateProgressBar() {
            if (loadingZone) {
                loadingZone.style.display = "flex";
                statusBar.style.width = "0%";
                statusPercentage.innerText = "0%";
            }
            let progress = 0;
            const interval = setInterval(() => {
                if (progress >= 90) {
                    clearInterval(interval);
                } else {
                    progress += Math.floor(Math.random() * 10) + 5;
                    if(progress > 90) progress = 90;
                    if (statusBar && statusPercentage) {
                        statusBar.style.width = `${progress}%`;
                        statusPercentage.innerText = `${progress}%`;
                    }
                }
            }, 200);
            return interval;
        }

        function endProgressBar(intervalId, success = true) {
            clearInterval(intervalId);
            if (success && statusBar && statusPercentage) {
                statusBar.style.width = "100%";
                statusPercentage.innerText = "100%";
                setTimeout(() => {
                    if (loadingZone) loadingZone.style.display = "none";
                }, 1000);
            } else {
                if (loadingZone) loadingZone.style.display = "none";
            }
        }

        // Extractor de ID ultra limpio (soporta music.youtube, shorts, links cortos)
        function getYouTubeID(url) {
            url = url.trim();
            if (url.includes('youtu.be/')) {
                return url.split('youtu.be/')[1].split(/[?#]/)[0];
            }
            if (url.includes('v=')) {
                return url.split('v=')[1].split('&')[0].split('#')[0];
            }
            const regExp = /(?:v|embed|shorts)\/([a-zA-Z0-9_-]{11})/;
            const match = url.match(regExp);
            return (match && match[1]) ? match[1] : null;
        }

        function handleDownload() {
            const urlInput = document.getElementById('target-url').value.trim();
            if (!urlInput) {
                printLog('! Error: Introduce un enlace.', 'text-error');
                return;
            }

            // Bloqueo de playlist (las APIs web libres solo convierten de a 1 video)
            if (urlInput.includes('list=')) {
                printLog('! Las Playlists no se pueden convertir directo en la web.', 'text-error');
                printLog('// Copiá el enlace de los temas por separado.', 'text-info');
                return;
            }

            const videoID = getYouTubeID(urlInput);
            if (!videoID) {
                printLog('! Error: Enlace no reconocido.', 'text-error');
                return;
            }

            mainBtn.disabled = true;
            downloadBox.style.display = "none";
            printLog('> Extrayendo audio en la nube...', 'text-info');
            const progressInterval = simulateProgressBar();

            // API externa libre de conversión MP3 directa
            const convertUrl = `https://api.deat.nu/download/mp3?id=${videoID}`;

            // Validamos que el archivo esté listo
            fetch(convertUrl)
                .then(res => {
                    if (res.ok) {
                        endProgressBar(progressInterval, true);
                        printLog('✓ ¡Audio listo para descargar!', 'text-success');
                        
                        // Le clavamos el link directo al botón verde
                        downloadLink.href = convertUrl;
                        downloadBox.style.display = "block";
                    } else {
                        throw new Error();
                    }
                })
                .catch(() => {
                    endProgressBar(progressInterval, false);
                    printLog('! Servidor ocupado. Intentá de nuevo en unos segundos.', 'text-error');
                })
                .finally(() => {
                    mainBtn.disabled = false;
                });
        }
    </script>
</body>
</html>
