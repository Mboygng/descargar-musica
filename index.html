<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBG STVDIO — CLOUD DOWNLOADER</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <main class="downloader-card">
        <header class="brand-header">
            <h1>MBG STVDIO</h1>
            <p class="subtitle">MOBILE CLOUD SYSTEM</p>
        </header>
        
        <div class="input-field">
            <input type="text" id="target-url" placeholder="Pegá el enlace de YouTube o Playlist" autocomplete="off">
            <span class="line-border"></span>
        </div>

        <button id="trigger-btn" onclick="startCloudDownload()">DESCARGAR EN IPHONE</button>

        <div class="console-output" id="terminal-screen">
            <p class="log-line text-muted">// Esperando enlace en la nube...</p>
        </div>
    </main>

    <script>
        function printLog(text, type = '') {
            const screen = document.getElementById('terminal-screen');
            const logLine = document.createElement('p');
            logLine.classList.add('log-line');
            if(type) logLine.classList.add(type);
            logLine.innerText = text;
            screen.appendChild(logLine);
            screen.scrollTop = screen.scrollHeight;
        }

        async function startCloudDownload() {
            const urlInput = document.getElementById('target-url').value.trim();
            const actionBtn = document.getElementById('trigger-btn');

            if (!urlInput) {
                printLog('! Error: Introduce un enlace válido.', 'text-error');
                return;
            }

            actionBtn.disabled = true;
            printLog('> Procesando enlace en la nube externa...', 'text-info');

            try {
                // 1. Llamamos a la API pública y gratuita de Cobalt para procesar el audio
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: urlInput,
                        downloadMode: 'audio', // Solo música
                        audioFormat: 'mp3',    // Formato MP3 universal
                        audioBitrate: '128'    // Calidad equilibrada para móvil
                    })
                });

                const data = await response.json();

                if (data.status === 'error') {
                    throw new Error(data.text || 'Error en el servidor de la nube.');
                }

                // 2. Si es una playlist o un mix con varios archivos devueltos
                const zip = new JSZip();
                const folderName = "MBG_TRACKS";
                const folder = zip.folder(folderName);

                if (data.status === 'picker' || Array.isArray(data.picker)) {
                    printLog('> Playlist detectada. Descargando elementos...', 'text-info');
                    
                    // Descargamos cada tema, lo numeramos y lo metemos al ZIP
                    for (let i = 0; i < data.picker.length; i++) {
                        const item = data.picker[i];
                        const indexStr = String(i + 1).padStart(2, '0'); // 01, 02, 03...
                        printLog(`[${indexStr}] Descargando: ${item.text || 'Track'}`, 'text-info');
                        
                        const fileAudio = await fetch(item.url).then(r => r.blob());
                        folder.file(`${indexStr} - ${item.text || 'Track'}.mp3`, fileAudio);
                    }
                } else if (data.status === 'redirect' && data.url) {
                    // Si es un solo video suelto
                    printLog('> Canción individual detectada...', 'text-info');
                    const fileAudio = await fetch(data.url).then(r => r.blob());
                    folder.file("01 - Audio Track.mp3", fileAudio);
                } else {
                    throw new Error('No se encontraron archivos de audio válidos.');
                }

                // 3. Generar el archivo ZIP final en la memoria del iPhone
                printLog('> Empaquetando todo en un .zip...', 'text-info');
                const content = await zip.generateAsync({ type: "blob" });
                
                // 4. Forzar la descarga automática del ZIP en el almacenamiento del iPhone
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `MBG_PACK_${Date.now()}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                printLog('✓ ¡Completado! El archivo .zip se guardó en tu iPhone.', 'text-success');

            } catch (error) {
                printLog(`! Fallo: ${error.message}`, 'text-error');
                console.error(error);
            } finally {
                actionBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
